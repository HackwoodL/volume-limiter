name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build release artifacts
        run: scripts/build-release.sh "${GITHUB_REF_NAME#v}"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            .build/release-artifacts/volume-limiter-cli-"$GITHUB_REF_NAME".zip \
            .build/release-artifacts/VolumeLimiter-gui-"$GITHUB_REF_NAME".zip \
            .build/release-artifacts/SHA256SUMS \
            --title "$GITHUB_REF_NAME" \
            --notes "Ad-hoc signed Volume Limiter release. Not notarized; remove quarantine with xattr -cr if needed."
